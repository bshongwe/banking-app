<!DOCTYPE html>
<html lang="en">
<head>
    <title>Banking App API - Interactive Console</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="swagger-ui.css">
</head>
<body>
    <div class="console-wrapper">
        <div class="redoc-wrapper">
            <redoc spec-url='/openapi/v1.json'></redoc>
        </div>
        
        <div class="console-panel">
            <h3>Request Builder</h3>
            
            <div class="form-group">
                <label for="method">Method</label>
                <select id="method">
                    <option>GET</option>
                    <option>POST</option>
                    <option>PUT</option>
                    <option>DELETE</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="url">URL</label>
                <input type="text" id="url" placeholder="/api/customers">
            </div>
            
            <div class="form-group">
                <label for="body">Body (JSON)</label>
                <textarea id="body" placeholder='{"key": "value"}'></textarea>
            </div>
            
            <div class="button-group">
                <button class="btn-send" onclick="sendRequest()">Send</button>
                <button class="btn-clear" onclick="clearForm()">Clear</button>
            </div>
            
            <div class="response-area" id="responseArea">
                <div class="response-status" id="responseStatus"></div>
                <div class="response-body" id="responseBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/redoc@latest/bundles/redoc.standalone.js"></script>
    
    <script>
        async function sendRequest() {
            const method = document.getElementById('method').value;
            const url = document.getElementById('url').value;
            const body = document.getElementById('body').value;
            const responseArea = document.getElementById('responseArea');
            const responseStatus = document.getElementById('responseStatus');
            const responseBody = document.getElementById('responseBody');

            if (!url) {
                alert('Please enter a URL');
                return;
            }

            responseStatus.textContent = 'Loading...';
            responseBody.textContent = '';
            responseArea.classList.add('show');

            try {
                const options = {
                    method: method,
                    headers: { 'Content-Type': 'application/json' }
                };

                if (body && (method === 'POST' || method === 'PUT')) {
                    try {
                        JSON.parse(body);
                        options.body = body;
                    } catch (e) {
                        responseStatus.textContent = 'Error: Invalid JSON';
                        responseBody.textContent = '';
                        console.error('Failed to parse JSON body:', e);
                        return;
                    }
                }

                const response = await fetch(`http://localhost:5242${url}`, options);
                const data = await response.json();

                responseStatus.textContent = `${response.status} ${response.statusText}`;
                responseBody.textContent = JSON.stringify(data, null, 2);
            } catch (error) {
                responseStatus.textContent = `Error: ${error.message}`;
                responseBody.textContent = '';
            }
        }

        function clearForm() {
            document.getElementById('method').value = 'GET';
            document.getElementById('url').value = '';
            document.getElementById('body').value = '';
            document.getElementById('responseArea').classList.remove('show');
        }
    </script>
</body>
</html>
